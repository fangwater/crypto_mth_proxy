# Open/hedge venues (mkt_signal naming).
# Same venue mode: must keep open_delay_us == hedge_delay_us.
# okex-futures maps to Kafka topic "okex-swap".
open_venue = "okex-futures"
hedge_venue = "okex-futures"

# Kafka bootstrap servers.
kafka_brokers = "10.61.10.36:9092"

# Kafka consumer group id.
kafka_group = "crypto_mth_proxy_04"
kafka_group_unique = true
kafka_offset_reset = "latest"

# Base directory for ZMQ ipc sockets.
ipc_dir = "/tmp/mth_pubs"

# Period gap warning interval (seconds).
period_warn_interval_secs = 5

# Tick signal interval (ms). Ticks are aligned on a continuous timeline across 3s periods.
tick_interval_ms = 5000

# Per-venue delay (us).
open_delay_us = 50000
hedge_delay_us = 50000
tick_delay_us = 0

# Only publish these symbols.
online_symbols = ["AAVEUSDT", "ADAUSDT", "ARBUSDT", "ATOMUSDT", "AVAXUSDT", "BARDUSDT", "BCHUSDT", "BNBUSDT", "BTCUSDT", "DOGEUSDT", "DOTUSDT", "ETCUSDT", "ETHUSDT", "HBARUSDT", "HYPEUSDT", "LINKUSDT", "LTCUSDT", "ONDOUSDT", "SOLUSDT", "TONUSDT", "TRUMPUSDT", "TRXUSDT", "XLMUSDT", "XRPUSDT", "WLDUSDT", "FILUSDT"]
